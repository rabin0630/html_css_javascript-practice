<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat</title>
  <link rel="stylesheet" href="css/style.css"> 
</head>
<body>
  <div class="container">
    <h1 class="tittle">RECOMMENDED CATS</h1>

    <div class="cat_wrapper">
      <div class="cat_inner">
        <img src="images/cat1.png" alt="" class="cat_img">
        <h2 class="cat_name">ミケ</h2>
        <p class="detail">人懐っこくて、膝の上が大好き。<br>おもちゃで遊ぶ姿は天使です。</p>
        <p class="age">年齢：3歳</p>
      </div>
      <div class="cat_inner">
        <img src="images/cat3.png" alt="" class="cat_img">
        <h2 class="cat_name">トラ</h2>
        <p class="detail">好奇心旺盛、元気いっぱいの男の子。<br>先住猫ともすぐに仲良くなれます。</p>
        <p class="age">年齢：1歳</p>
      </div>
      <div class="cat_inner">
        <img src="images/cat2.png" alt="" class="cat_img">
        <h2 class="cat_name">クロ</h2>
        <p class="detail">賢くて穏やか、お昼寝が趣味。<br>夜は一緒に布団に入ってくれます。</p>
        <p class="age">年齢：5歳</p>
      </div>
    </div>
  </div>
</body>
</html>
