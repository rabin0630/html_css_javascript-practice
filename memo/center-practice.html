<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {
      background-color: aqua;
      display: flex;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
    }
    .wrapper {
      background-color: white;
      padding: 8rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    h1 {
      background-color: black;
      color: white;
      padding: 1.5rem;
      font-size: 3rem;
    }
    .button-wrapper {
      display: flex;
      justify-content: space-around;
      background-color: aqua;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Hello world</h1>
    <div class="button-wrapper">
      <button>shit</button>
      <button>shit</button>
      <button>shit</button>
    </div>
    
  </div>
  
</body>
</html>
